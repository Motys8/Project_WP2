<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${item.title} + ' — Foundite'">Item — Foundite</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <h1>Foundite</h1>
        <a th:href="@{/}">&larr; Back to all items</a>
    </header>

    <main>
        <article>
            <h2 th:text="${item.title}">Title</h2>
            <p><strong>Category:</strong> <span th:text="${item.category}">Category</span></p>
            <p><strong>Location:</strong> <span th:text="${item.location}">Location</span></p>
            <p><strong>Reported on:</strong> <span th:text="${item.createdAt}">date</span></p>
            <hr>
            <p th:text="${item.description}">Description</p>
        </article>
    </main>
</body>
</html>
